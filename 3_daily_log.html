<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FitUp — Add Meal Entry</title>
<meta name="description" content="Add meal entries to your daily log with batch selection.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
<style>
:root{--bg:#0a0a0f;--surface:#12121a;--elevated:#1a1a26;--border:rgba(255,255,255,0.05);--accent:#7c5cfc;--green:#22d3a0;--amber:#f59e0b;--red:#f43f5e;--purple:#a855f7;--text:#f0f0ff;--muted:#6b6b8a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:140px}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif}
.page{max-width:430px;margin:0 auto;padding:16px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.back-link{color:var(--muted);text-decoration:none;font-size:1.2rem;padding:4px}
.header h1{font-size:1.2rem;font-weight:700}
.search-bar{width:100%;padding:12px 16px;background:var(--elevated);border:1px solid var(--border);border-radius:14px;color:var(--text);font-size:.95rem;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:16px;transition:border-color .2s}
.search-bar:focus{border-color:var(--accent)}
/* Food Item Row */
.food-item{display:flex;align-items:center;gap:12px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;cursor:pointer;opacity:0;transition:all .2s}
.food-item:hover{background:var(--elevated)}
.food-item.selected{border-color:var(--accent);background:rgba(124,92,252,.08);box-shadow:0 0 12px rgba(124,92,252,.15)}
.food-check{width:22px;height:22px;border-radius:7px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:.75rem;color:transparent}
.food-item.selected .food-check{border-color:var(--accent);background:var(--accent);color:#fff}
.food-info{flex:1;min-width:0}
.food-name{font-weight:600;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.food-meta{color:var(--muted);font-size:.78rem;margin-top:2px}
/* Inline Quantity Stepper (visible when selected) */
.qty-inline{display:none;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.food-item.selected .qty-inline{display:flex}
.qty-inline-btn{width:32px;height:32px;border-radius:10px;background:var(--elevated);border:1px solid var(--border);color:var(--text);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif}
.qty-inline-val{font-size:1.1rem;font-weight:800;font-family:'Space Grotesk',sans-serif;min-width:36px;text-align:center}
.qty-inline-summary{flex:1;text-align:right;font-size:.78rem;color:var(--muted);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qty-inline-summary b{color:var(--text)}
/* Batch Tray */
.batch-tray{position:fixed;bottom:64px;left:0;right:0;transform:translateY(100px);width:100%;background:linear-gradient(var(--surface),var(--surface)) padding-box,linear-gradient(135deg,rgba(124,92,252,.4),rgba(34,211,160,.3)) border-box;border-top:1px solid transparent;border-radius:0;padding:14px 16px;z-index:90;display:flex;align-items:center;gap:10px;box-shadow:0 -4px 30px rgba(0,0,0,.4);opacity:0;flex-wrap:wrap}
.batch-tray.show{opacity:1;transform:translateY(0)}
.batch-info{flex:1}
.batch-count{font-weight:700;font-size:.95rem;font-family:'Space Grotesk',sans-serif}
.batch-total{color:var(--muted);font-size:.78rem;margin-top:2px}
.batch-btn{padding:12px 24px;border:none;border-radius:14px;background:var(--accent);color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:filter .2s;white-space:nowrap}
.batch-btn:hover{filter:brightness(1.15)}
.batch-btn:disabled{opacity:.6;cursor:not-allowed}
/* Misc */
.shimmer{border-radius:14px;background:linear-gradient(90deg,var(--elevated) 25%,var(--surface) 50%,var(--elevated) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;height:60px;margin-bottom:10px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-60px);padding:10px 24px;border-radius:30px;font-size:.88rem;font-weight:600;z-index:999;opacity:0;pointer-events:none;font-family:'DM Sans',sans-serif}
.toast.success{background:var(--accent);color:#fff}
.toast.error{background:var(--red);color:#fff}
.toast.info{background:var(--muted);color:#fff}
.empty-state{text-align:center;color:var(--muted);padding:40px 0;font-size:.92rem}
/* Filter tabs */
.filter-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px;scrollbar-width:none;-ms-overflow-style:none}
.filter-tabs::-webkit-scrollbar{display:none}
.filter-tab{white-space:nowrap;padding:8px 14px;border-radius:12px;background:var(--elevated);border:1px solid var(--border);color:var(--muted);font-size:.8rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;flex-shrink:0}
.filter-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 12px;z-index:100}
.nav-tab{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--muted);font-size:.68rem;cursor:pointer;padding:4px 8px;position:relative;font-family:'DM Sans',sans-serif}
.nav-tab .icon{font-size:1.3rem}
.nav-tab.active .icon{transform:scale(1.2)}
.nav-tab.active{color:var(--accent)}
.nav-underline{position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:20px;height:3px;background:var(--accent);border-radius:2px;display:none}
.nav-tab.active .nav-underline{display:block}
/* Mobile-first adjustments */
@media(max-width:380px){
  .food-item{padding:10px;gap:8px}
  .food-name{font-size:.85rem}
  .food-meta{font-size:.72rem}
  .qty-inline-summary{font-size:.72rem}
  .batch-tray{padding:12px 12px}
  .batch-count{font-size:.88rem}
  .batch-total{font-size:.72rem}
  .batch-btn{padding:10px 16px;font-size:.88rem}
}
/* Responsive */
@media(min-width:768px){.page{max-width:600px;padding:24px}.bottom-nav{max-width:600px}.batch-tray{max-width:600px;width:100%}}
@media(min-width:1200px){.page{max-width:700px;padding:32px}.bottom-nav{max-width:700px}.batch-tray{max-width:700px}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="page">
  <div class="header">
    <a href="2_dashboard.html" class="back-link">←</a>
    <h1 id="pageTitle">Add to Breakfast</h1>
  </div>
  <input type="text" class="search-bar" id="searchInput" placeholder="Search foods…">
  <div class="filter-tabs" id="filterTabs">
    <button class="filter-tab active" data-filter="all">All</button>
    <button class="filter-tab" data-filter="breakfast">Breakfast</button>
    <button class="filter-tab" data-filter="lunch">Lunch</button>
    <button class="filter-tab" data-filter="dinner">Dinner</button>
    <button class="filter-tab" data-filter="snack">Snack</button>
    <button class="filter-tab" data-filter="drink">Drink</button>
  </div>
  <div id="shimmerWrap">
    <div class="shimmer"></div><div class="shimmer"></div><div class="shimmer"></div>
  </div>
  <div id="foodList"></div>
</div>

<!-- Batch Tray -->
<div class="batch-tray" id="batchTray">
  <div class="batch-info">
    <div class="batch-count" id="batchCount">0 items selected</div>
    <div class="batch-total" id="batchTotal">0 kcal | P:0g C:0g F:0g</div>
  </div>
  <button class="batch-btn" id="batchClear" style="background:var(--elevated);color:var(--muted);padding:12px 16px">Clear</button>
  <button class="batch-btn" id="batchBtn">Add All</button>
</div>

<nav class="bottom-nav">
  <button class="nav-tab" onclick="location.href='2_dashboard.html'"><span class="icon">🏠</span>Home<div class="nav-underline"></div></button>
  <button class="nav-tab active" onclick="location.href='3_daily_log.html'"><span class="icon">📋</span>Log<div class="nav-underline"></div></button>
  <button class="nav-tab" onclick="location.href='4_food_library.html'"><span class="icon">🥗</span>Library<div class="nav-underline"></div></button>
  <button class="nav-tab" onclick="location.href='7_history.html'"><span class="icon">📈</span>History<div class="nav-underline"></div></button>
  <button class="nav-tab" onclick="location.href='6_profile.html'"><span class="icon">👤</span>Profile<div class="nav-underline"></div></button>
</nav>

<script type="module">
import { getCurrentUser, databases, ID, Query,
         DATABASE_ID, COL_FOOD_ITEMS, COL_DAILY_LOGS, COL_MEAL_ENTRIES,
         renderFoodIcon, todayStr, userPermissions } from './appwrite.js';

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type;
  anime({ targets: t, translateY: [-60, 0], opacity: [0,1], duration: 400, easing:'easeOutExpo' });
  setTimeout(() => anime({ targets: t, opacity: 0, translateY: -30, duration: 300 }), 3000);
}

const params = new URLSearchParams(window.location.search);
const slot = params.get('slot') || 'breakfast';
document.getElementById('pageTitle').textContent = `Add to ${slot.charAt(0).toUpperCase()+slot.slice(1)}`;

let allFoods = [];
let dailyLog = null;
// Selection map: { foodId: { food, quantity } }
let selected = {};
let activeFilter = 'all';
let searchQuery = '';

(async () => {
  const user = await getCurrentUser();
  if (!user) return;
  const userId = user.$id;
  const today = todayStr();

  // Get/create daily log
  try {
    const logRes = await databases.listDocuments(DATABASE_ID, COL_DAILY_LOGS, [
      Query.equal('user_id', userId), Query.equal('log_date', today), Query.limit(1)
    ]);
    if (logRes.documents.length) { dailyLog = logRes.documents[0]; }
    else {
      const now = new Date().toISOString();
      dailyLog = await databases.createDocument(DATABASE_ID, COL_DAILY_LOGS, ID.unique(), {
        user_id: userId, log_date: today, total_calories:0, total_protein_g:0,
        total_carbs_g:0, total_fats_g:0, total_fiber_g:0, water_ml:0,
        is_cheat_day:false, calories_remaining:0, calorie_deficit:0,
        mood:'okay', note:'', created_at: now, updated_at: now
      }, userPermissions(userId));
    }
  } catch (e) { showToast('Failed to load daily log', 'error'); return; }

  // Fetch foods
  try {
    const res = await databases.listDocuments(DATABASE_ID, COL_FOOD_ITEMS, [
      Query.equal('user_id', userId), Query.limit(100)
    ]);
    allFoods = res.documents;
  } catch (e) { showToast('Failed to load foods', 'error'); }

  document.getElementById('shimmerWrap').style.display = 'none';
  renderFoods();
})();

function getFilteredFoods() {
  return allFoods.filter(f => {
    if (searchQuery && !f.name.toLowerCase().includes(searchQuery)) return false;
    if (activeFilter === 'all') return true;
    return f.category === activeFilter;
  });
}

function renderFoods() {
  const foods = getFilteredFoods();
  const list = document.getElementById('foodList');
  list.innerHTML = '';
  if (!foods.length) { list.innerHTML = '<div class="empty-state">No foods found. Add some in the Food Library!</div>'; return; }
  foods.forEach((f, i) => {
    const row = document.createElement('div');
    row.className = 'food-item' + (selected[f.$id] ? ' selected' : '');
    row.id = 'food-' + f.$id;

    const check = document.createElement('div');
    check.className = 'food-check';
    check.textContent = '✓';

    const iconEl = renderFoodIcon(f.icon_type, f.icon_key, 40);

    const info = document.createElement('div');
    info.className = 'food-info';

    const qty = selected[f.$id] ? selected[f.$id].quantity : 1;
    const cal = Math.round(f.calories * qty);
    const p = Math.round(f.protein_g * qty * 10) / 10;
    const c = Math.round(f.carbs_g * qty * 10) / 10;
    const fat = Math.round(f.fats_g * qty * 10) / 10;

    info.innerHTML = `<div class="food-name">${f.name}</div>
      <div class="food-meta">${f.calories} kcal / ${f.serving_size} ${f.serving_unit}</div>
      <div class="qty-inline">
        <button class="qty-inline-btn qty-dec" data-id="${f.$id}">−</button>
        <div class="qty-inline-val" id="qtyVal-${f.$id}">${qty}</div>
        <button class="qty-inline-btn qty-inc" data-id="${f.$id}">+</button>
        <div class="qty-inline-summary" id="qtySummary-${f.$id}"><b>${cal} kcal</b> | P:${p}g C:${c}g F:${fat}g</div>
      </div>`;

    row.appendChild(check);
    row.appendChild(iconEl);
    row.appendChild(info);

    // Toggle selection on row click
    row.addEventListener('click', (e) => {
      if (e.target.closest('.qty-inline-btn')) return; // don't toggle when clicking +/-
      toggleSelect(f, row);
    });

    list.appendChild(row);
  });

  // Wire quantity buttons
  list.querySelectorAll('.qty-inc').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      changeQty(btn.dataset.id, 0.5);
    });
  });
  list.querySelectorAll('.qty-dec').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      changeQty(btn.dataset.id, -0.5);
    });
  });

  anime({ targets: '.food-item', translateY: [10, 0], opacity: [0, 1], delay: anime.stagger(40), duration: 400, easing: 'easeOutExpo' });
}

function toggleSelect(food, row) {
  if (selected[food.$id]) {
    delete selected[food.$id];
    row.classList.remove('selected');
    anime({ targets: row, borderColor: 'rgba(255,255,255,0.05)', duration: 200 });
  } else {
    selected[food.$id] = { food, quantity: 1 };
    row.classList.add('selected');
    anime({ targets: row.querySelector('.food-check'), scale: [0, 1.3, 1], duration: 400, easing: 'easeOutElastic(1,.6)' });
  }
  updateQtyDisplay(food.$id);
  updateBatchTray();
}

function changeQty(foodId, delta) {
  if (!selected[foodId]) return;
  let q = selected[foodId].quantity + delta;
  q = Math.max(0.5, Math.round(q * 10) / 10);
  selected[foodId].quantity = q;
  updateQtyDisplay(foodId);
  updateBatchTray();
  const el = document.getElementById('qtyVal-' + foodId);
  if (el) anime({ targets: el, translateY: [delta > 0 ? -8 : 8, 0], duration: 200, easing: 'easeOutExpo' });
}

function updateQtyDisplay(foodId) {
  if (!selected[foodId]) return;
  const { food, quantity } = selected[foodId];
  const valEl = document.getElementById('qtyVal-' + foodId);
  const sumEl = document.getElementById('qtySummary-' + foodId);
  if (valEl) valEl.textContent = quantity;
  if (sumEl) {
    const cal = Math.round(food.calories * quantity);
    const p = Math.round(food.protein_g * quantity * 10) / 10;
    const c = Math.round(food.carbs_g * quantity * 10) / 10;
    const f = Math.round(food.fats_g * quantity * 10) / 10;
    sumEl.innerHTML = `<b>${cal} kcal</b> | P:${p}g C:${c}g F:${f}g`;
  }
}

function updateBatchTray() {
  const keys = Object.keys(selected);
  const tray = document.getElementById('batchTray');
  if (keys.length === 0) {
    if (tray.classList.contains('show')) {
      anime({ targets: tray, translateY: [0, 100], opacity: [1, 0], duration: 300, easing: 'easeInExpo', complete: () => tray.classList.remove('show') });
    }
    return;
  }

  let totalCal = 0, totalP = 0, totalC = 0, totalF = 0;
  keys.forEach(id => {
    const { food, quantity } = selected[id];
    totalCal += food.calories * quantity;
    totalP += food.protein_g * quantity;
    totalC += food.carbs_g * quantity;
    totalF += food.fats_g * quantity;
  });

  document.getElementById('batchCount').textContent = `${keys.length} item${keys.length > 1 ? 's' : ''} selected`;
  document.getElementById('batchTotal').textContent = `${Math.round(totalCal)} kcal | P:${Math.round(totalP)}g C:${Math.round(totalC)}g F:${Math.round(totalF)}g`;

  if (!tray.classList.contains('show')) {
    tray.classList.add('show');
    anime({ targets: tray, translateY: [100, 0], opacity: [0, 1], duration: 400, easing: 'spring(1, 80, 10, 0)' });
  }
}

// Filter tabs
document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeFilter = tab.dataset.filter;
    renderFoods();
  });
});

// Search
let searchTimer;
document.getElementById('searchInput').addEventListener('input', (e) => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value.toLowerCase().trim();
    renderFoods();
  }, 300);
});

// Clear selection
document.getElementById('batchClear').addEventListener('click', () => {
  Object.keys(selected).forEach(id => {
    const row = document.getElementById('food-' + id);
    if (row) row.classList.remove('selected');
  });
  selected = {};
  updateBatchTray();
  anime({ targets: '#batchClear', scale: [1, 0.94, 1], duration: 200 });
});

// Batch submission
document.getElementById('batchBtn').addEventListener('click', async () => {
  const keys = Object.keys(selected);
  if (!keys.length || !dailyLog) return;

  const btn = document.getElementById('batchBtn');
  btn.disabled = true;
  btn.textContent = 'Adding…';
  anime({ targets: btn, scale: [1, 0.94, 1], duration: 200 });

  const user = await getCurrentUser();
  if (!user) return;
  const userId = user.$id;

  try {
    // Create all entries in parallel
    const promises = keys.map(id => {
      const { food, quantity } = selected[id];
      return databases.createDocument(DATABASE_ID, COL_MEAL_ENTRIES, ID.unique(), {
        user_id: userId,
        daily_log_id: dailyLog.$id,
        food_item_id: food.$id,
        meal_slot: slot,
        quantity,
        calories_consumed: Math.round(food.calories * quantity * 10) / 10,
        protein_consumed_g: Math.round(food.protein_g * quantity * 10) / 10,
        carbs_consumed_g: Math.round(food.carbs_g * quantity * 10) / 10,
        fats_consumed_g: Math.round(food.fats_g * quantity * 10) / 10,
        logged_at: new Date().toISOString(),
        note: ''
      }, userPermissions(userId));
    });
    await Promise.all(promises);

    // Recalculate totals
    const entries = await databases.listDocuments(DATABASE_ID, COL_MEAL_ENTRIES, [
      Query.equal('daily_log_id', dailyLog.$id), Query.limit(100)
    ]);
    let tc=0,tp=0,tca=0,tf=0;
    entries.documents.forEach(e => { tc+=e.calories_consumed; tp+=e.protein_consumed_g; tca+=e.carbs_consumed_g; tf+=e.fats_consumed_g; });
    await databases.updateDocument(DATABASE_ID, COL_DAILY_LOGS, dailyLog.$id, {
      total_calories: Math.round(tc), total_protein_g: Math.round(tp*10)/10,
      total_carbs_g: Math.round(tca*10)/10, total_fats_g: Math.round(tf*10)/10,
      updated_at: new Date().toISOString()
    });

    // Success
    anime({ targets: btn, backgroundColor: ['#7c5cfc','#22d3a0','#7c5cfc'], duration: 600 });
    showToast(`${keys.length} item${keys.length > 1 ? 's' : ''} added!`);
    setTimeout(() => { window.location.href = '2_dashboard.html'; }, 600);
  } catch (e) {
    showToast(e.message || 'Failed to add entries', 'error');
    btn.disabled = false;
    btn.textContent = 'Add All';
  }
});
</script>
</body>
</html>
